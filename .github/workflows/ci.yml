name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: database_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    env:
      NODE_ENV: test
      PORT: 3000
      JWT_KEY: test_secret_key_for_ci
      JWT_EXPIRES_IN: 1h
      CLIENT_ORIGINS: http://localhost:3001
      TRUST_PROXY: false
      RESET_PASSWORD_URL_BASE: http://localhost:3000/api/user/reset-password
      SHOW_RESET_LINK_IN_LOGS: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -P 3306 -u root && exit 0
            echo "Waiting for MySQL..."
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Create test database if needed
        run: npm run test:db:create || true

      - name: Reset test database
        run: npm run test:db:reset

      - name: Run tests
        run: npm run test:ci
